<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Signal AI Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .output {
      margin-top: 24px;
      padding: 16px;
      background: white;
      border: 1px solid #ddd;
      min-height: 120px;
      white-space: pre-wrap;
    }

    .status {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <script>
    const enteredPassword = prompt("请输入密码");
    window.__accessGranted = enteredPassword === "13029003636";
  </script>

  <h1>Global Signal AI 测试页</h1>

  <textarea id="message" placeholder="在这里输入你想对 AI 说的话..."></textarea>
  <button id="sendBtn">发送给 AI</button>

  <div class="status" id="status"></div>
  <div class="output" id="output">AI 回复会显示在这里</div>

  <script>
    if (!window.__accessGranted) {
      document.body.innerHTML = "Access denied";
    } else {
    const sendBtn = document.getElementById("sendBtn");
    const messageInput = document.getElementById("message");
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    sendBtn.addEventListener("click", async () => {
      const message = messageInput.value.trim();

      if (!message) {
        status.textContent = "请先输入内容";
        return;
      }

      status.textContent = "正在请求 AI...";
      output.textContent = "";

      try {
        const response = await fetch("/api/ai", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        const reply =
          data?.text ||
          data?.output?.[0]?.content?.[0]?.text ||
          data?.data?.output?.[0]?.content?.[0]?.text ||
          "";

        output.textContent = reply || "（AI 未返回文本内容）";
        status.textContent = "请求成功";
      } catch (error) {
        output.textContent = "请求失败：" + error.message;
        status.textContent = "出错了";
      }
    });
    }
  </script>
</body>
</html>
